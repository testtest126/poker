# Generated with XcodeGen — the .xcodeproj is derived, not committed.
#   brew install xcodegen && cd app && xcodegen && open Poker.xcodeproj
name: Poker
options:
  bundleIdPrefix: io.github.testtest126
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  PokerKit:
    path: ../PokerKit
targets:
  Poker:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: PokerKit
        product: PokerKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.testtest126.poker
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  PokerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Poker
schemes:
  Poker:
    build:
      targets:
        Poker: all
        PokerUITests: [test]
    test:
      targets:
        - PokerUITests
